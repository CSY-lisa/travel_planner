<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- 網頁資安防護 (Security Headers) -->
    <!-- 1. CSP: 限制資源來源，防範 XSS 攻擊 -->
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://www.google.com https://maps.google.com; connect-src 'self' https://open.er-api.com; object-src 'none'; base-uri 'self'; form-action 'self';">
    <!-- 2. 防止網址洩漏來源路徑資訊 -->
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <!-- 3. 防止 MIME 類型嗅探 (防止偽裝成圖片的惡意腳本) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <!-- 4. 權限政策：禁用不需要的硬體權限 (如攝影機、麥克風) -->
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(self)">

    <!-- PWA / 手機加入主畫面圖示設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="廣島深度旅">
    <!-- iOS 桌面圖示 -->
    <link rel="apple-touch-icon" href="icon.png?v=3">
    <!-- Web App Manifest (Chrome/Android) -->
    <link rel="manifest" href="manifest.json">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="icon.png?v=3">

    <title>2026 廣島深度旅 🇯🇵</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隱藏捲軸但保留滑動功能 (僅手機版) */
        @media (max-width: 768px) {
            .no-scrollbar::-webkit-scrollbar {
                display: none;
            }

            .no-scrollbar {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
        }

        /* 地圖容器響應式 */
        .map-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 0.5rem;
        }

        .map-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        body {
            -webkit-tap-highlight-color: transparent;
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 左右輕微晃動動畫 */
        @keyframes wiggle {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-3px);
            }

            75% {
                transform: translateX(3px);
            }
        }

        .animate-wiggle {
            animation: wiggle 1.5s ease-in-out infinite;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 font-sans pb-16">

    <header class="fixed top-0 w-full z-50 bg-white/95 backdrop-blur shadow-sm border-b border-gray-200">
        <div class="flex justify-between items-center px-4 py-3 max-w-7xl mx-auto w-full">
            <div>
                <h1 class="text-lg font-bold text-teal-700">廣島深度旅 2026</h1>
                <p class="text-xs text-gray-500">3/5 (四) - 3/13 (五)</p>
            </div>
            <a href="https://www.google.com/maps" target="_blank" class="text-2xl">🗺️</a>
        </div>

        <div class="flex overflow-x-auto whitespace-nowrap px-2 py-2 no-scrollbar bg-gray-50 border-t border-gray-200 justify-start md:justify-center"
            id="nav-container">
            <button onclick="switchDay('overview')" data-target="overview"
                class="nav-btn active bg-teal-600 text-white px-4 py-1.5 rounded-full text-sm font-bold shadow-md mr-2 flex-shrink-0 transition-all cursor-pointer">
                📅 總覽
            </button>
            <button onclick="switchDay('day1')" data-target="day1"
                class="nav-btn bg-white text-gray-600 border border-gray-300 px-4 py-1.5 rounded-full text-sm font-medium mr-2 flex-shrink-0 transition-all cursor-pointer">3/5</button>
            <button onclick="switchDay('day2')" data-target="day2"
                class="nav-btn bg-white text-gray-600 border border-gray-300 px-4 py-1.5 rounded-full text-sm font-medium mr-2 flex-shrink-0 transition-all cursor-pointer">3/6</button>
            <button onclick="switchDay('day3')" data-target="day3"
                class="nav-btn bg-white text-gray-600 border border-gray-300 px-4 py-1.5 rounded-full text-sm font-medium mr-2 flex-shrink-0 transition-all cursor-pointer">3/7</button>
            <button onclick="switchDay('day4')" data-target="day4"
                class="nav-btn bg-white text-gray-600 border border-gray-300 px-4 py-1.5 rounded-full text-sm font-medium mr-2 flex-shrink-0 transition-all cursor-pointer">3/8</button>
            <button onclick="switchDay('day5')" data-target="day5"
                class="nav-btn bg-white text-gray-600 border border-gray-300 px-4 py-1.5 rounded-full text-sm font-medium mr-2 flex-shrink-0 transition-all cursor-pointer">3/9</button>
            <button onclick="switchDay('day6')" data-target="day6"
                class="nav-btn bg-white text-gray-600 border border-gray-300 px-4 py-1.5 rounded-full text-sm font-medium mr-2 flex-shrink-0 transition-all cursor-pointer">3/10</button>
            <button onclick="switchDay('day7')" data-target="day7"
                class="nav-btn bg-white text-gray-600 border border-gray-300 px-4 py-1.5 rounded-full text-sm font-medium mr-2 flex-shrink-0 transition-all cursor-pointer">3/11</button>
            <button onclick="switchDay('day8')" data-target="day8"
                class="nav-btn bg-white text-gray-600 border border-gray-300 px-4 py-1.5 rounded-full text-sm font-medium mr-2 flex-shrink-0 transition-all cursor-pointer">3/12</button>
            <button onclick="switchDay('day9')" data-target="day9"
                class="nav-btn bg-white text-gray-600 border border-gray-300 px-4 py-1.5 rounded-full text-sm font-medium mr-2 flex-shrink-0 transition-all cursor-pointer">3/13</button>
        </div>
    </header>

    <div class="h-28"></div>

    <main class="w-full min-h-screen relative">
        <div id="main-content">
            <!-- Dynamic Content Loaded Here -->
            <div class="flex justify-center items-center h-64">
                <div class="animate-pulse text-teal-600">Loading Journey...</div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="js/app.js?v=20260216"></script>

    <!-- Bottom Tab Bar -->
    <nav class="fixed bottom-0 left-0 right-0 z-50 bg-white border-t border-gray-200 shadow-lg">
      <div class="flex justify-around items-center h-14 max-w-7xl mx-auto px-4">
        <button onclick="switchTab('itinerary')" id="tab-itinerary"
          class="tab-btn flex flex-col items-center justify-center gap-0.5 flex-1 h-full text-teal-600 font-bold">
          <span class="text-xl">🗓️</span>
          <span class="text-[10px]">行程</span>
        </button>
        <button onclick="switchTab('reference')" id="tab-reference"
          class="tab-btn flex flex-col items-center justify-center gap-0.5 flex-1 h-full text-gray-400 font-medium">
          <span class="text-xl">📋</span>
          <span class="text-[10px]">補充資料</span>
        </button>
        <button onclick="switchTab('budget')" id="tab-budget"
          class="tab-btn flex flex-col items-center justify-center gap-0.5 flex-1 h-full text-gray-400 font-medium">
          <span class="text-xl">💰</span>
          <span class="text-[10px]">費用</span>
        </button>
        <button onclick="switchTab('rate')" id="tab-rate"
          class="tab-btn flex flex-col items-center justify-center gap-0.5 flex-1 h-full text-gray-400 font-medium">
          <span class="text-xl">💴</span>
          <span class="text-[10px]">匯率</span>
        </button>
        <button onclick="switchTab('important')" id="tab-important"
          class="tab-btn flex flex-col items-center justify-center gap-0.5 flex-1 h-full text-gray-400 font-medium">
          <span class="text-xl">🆘</span>
          <span class="text-[10px]">旅遊資訊</span>
        </button>
      </div>
    </nav>

    <script>
      function switchDay(targetId) {
        window.location.hash = targetId === 'overview' ? '#overview' : '#' + targetId;
      }
      function switchTab(tab) {
        if (tab === 'itinerary') window.location.hash = '#overview';
        else if (tab === 'important') window.location.hash = '#important';
        else window.location.hash = '#' + tab;
      }
    </script>
</body>

</html>
